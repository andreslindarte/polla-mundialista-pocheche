<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Polla Mundialista — Área Pocheche</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Inter:wght@400;500;600&display=swap');

:root {
  --navy:    #08121E;
  --blue:    #0F2744;
  --mid:     #1A4A7A;
  --accent:  #F0B429;
  --green:   #22C55E;
  --red:     #EF4444;
  --muted:   #64748B;
  --surface: #111C2B;
  --surface2:#162236;
  --border:  rgba(255,255,255,.08);
  --text:    #E2EBF4;
  --radius:  10px;
}
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Inter',sans-serif; background:var(--navy); color:var(--text); min-height:100vh; }

/* ── LOADING SCREEN ── */
#loading-screen {
  min-height:100vh; display:flex; flex-direction:column;
  align-items:center; justify-content:center; padding:24px;
  background:radial-gradient(ellipse 80% 60% at 50% 0%, #0F2744 0%, #08121E 70%);
}
.logo-mark { font-size:4rem; margin-bottom:16px; filter:drop-shadow(0 0 24px rgba(240,180,41,.4)); }
#loading-screen h1 {
  font-family:'Barlow Condensed',sans-serif;
  font-size:clamp(2rem,6vw,3.2rem); font-weight:900; letter-spacing:.04em;
  text-align:center; line-height:1.05; margin-bottom:6px;
}
#loading-screen h1 span { color:var(--accent); }
.subtitle { color:var(--muted); font-size:.95rem; text-align:center; margin-bottom:36px; }

/* spinner */
.spinner-wrap { display:flex; flex-direction:column; align-items:center; gap:14px; margin-bottom:28px; }
.spinner {
  width:44px; height:44px; border-radius:50%;
  border:3px solid rgba(240,180,41,.2);
  border-top-color:var(--accent);
  animation:spin .8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
.spinner-wrap p { font-size:.88rem; color:var(--muted); }

/* manual upload fallback */
.divider {
  display:flex; align-items:center; gap:12px; width:100%; max-width:400px;
  color:var(--muted); font-size:.78rem; margin-bottom:20px;
}
.divider::before, .divider::after { content:''; flex:1; height:1px; background:var(--border); }

.drop-zone {
  width:100%; max-width:400px; border:2px dashed rgba(240,180,41,.3);
  border-radius:12px; padding:28px 24px; text-align:center; cursor:pointer;
  background:rgba(255,255,255,.02); position:relative;
  transition:border-color .2s, background .2s;
}
.drop-zone:hover, .drop-zone.drag-over { border-color:var(--accent); background:rgba(240,180,41,.05); }
.drop-zone input[type=file] { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
.drop-zone p { font-size:.85rem; color:var(--muted); }
.drop-zone p strong { color:var(--text); }

.error-msg {
  margin-top:16px; padding:10px 16px; border-radius:8px;
  background:rgba(239,68,68,.1); border:1px solid rgba(239,68,68,.3);
  color:#FCA5A5; font-size:.82rem; max-width:400px; text-align:center; display:none;
}

/* ── HEADER ── */
#app { display:none; }
header {
  background:var(--blue); border-bottom:2px solid var(--accent);
  padding:0 24px; height:60px;
  display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; z-index:100;
}
.header-left { display:flex; align-items:center; gap:12px; }
.header-logo { font-size:1.5rem; }
header h1 { font-family:'Barlow Condensed',sans-serif; font-size:1.35rem; font-weight:800; letter-spacing:.06em; }
header h1 span { color:var(--accent); }
.header-right { display:flex; align-items:center; gap:10px; }
.last-updated { font-size:.75rem; color:var(--muted); }
.reload-btn {
  background:rgba(255,255,255,.08); border:1px solid var(--border);
  color:var(--text); border-radius:6px; padding:6px 14px;
  font-size:.8rem; font-weight:500; cursor:pointer; transition:background .15s;
}
.reload-btn:hover { background:rgba(255,255,255,.15); }

/* ── TABS ── */
.tab-bar {
  display:flex; background:var(--surface);
  border-bottom:1px solid var(--border); padding:0 24px;
}
.tab {
  padding:14px 20px; cursor:pointer; font-weight:600;
  font-size:.88rem; color:var(--muted); border-bottom:3px solid transparent;
  transition:color .15s, border-color .15s; margin-bottom:-1px;
}
.tab:hover { color:var(--text); }
.tab.active { color:var(--accent); border-bottom-color:var(--accent); }

main { max-width:1100px; margin:0 auto; padding:28px 20px 60px; }
.panel { display:none; }
.panel.active { display:block; animation:fadeUp .25s ease; }
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

/* ── RANKING ── */
.ranking-header {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:20px; flex-wrap:wrap; gap:12px;
}
.ranking-header h2 { font-family:'Barlow Condensed',sans-serif; font-size:1.4rem; font-weight:800; letter-spacing:.05em; }
.matches-played {
  font-size:.82rem; color:var(--muted);
  background:var(--surface2); border:1px solid var(--border);
  border-radius:20px; padding:4px 14px;
}
.podium { display:flex; justify-content:center; align-items:flex-end; gap:12px; margin-bottom:32px; }
.podium-slot {
  display:flex; flex-direction:column; align-items:center;
  background:var(--surface2); border:1px solid var(--border);
  border-radius:var(--radius); padding:16px 20px 12px; min-width:120px; transition:transform .2s;
}
.podium-slot:hover { transform:translateY(-3px); }
.podium-slot.p1 { border-color:rgba(240,180,41,.5); background:linear-gradient(160deg,rgba(240,180,41,.1),var(--surface2)); padding-top:24px; }
.podium-slot.p2 { border-color:rgba(148,163,184,.3); }
.podium-slot.p3 { border-color:rgba(180,130,80,.3); }
.podium-medal { font-size:1.6rem; margin-bottom:6px; }
.podium-name { font-weight:600; font-size:.9rem; text-align:center; margin-bottom:4px; max-width:110px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.podium-pts { font-family:'Barlow Condensed',sans-serif; font-size:2rem; font-weight:900; color:var(--accent); line-height:1; }
.podium-pts-lbl { font-size:.7rem; color:var(--muted); margin-top:2px; }
.rank-table { width:100%; border-collapse:collapse; }
.rank-table thead tr { background:var(--mid); font-family:'Barlow Condensed',sans-serif; font-size:.9rem; letter-spacing:.06em; }
.rank-table th { padding:10px 14px; text-align:left; font-weight:700; }
.rank-table th:not(:first-child) { text-align:center; }
.rank-table tbody tr { border-bottom:1px solid var(--border); transition:background .12s; }
.rank-table tbody tr:hover { background:rgba(255,255,255,.04); }
.rank-table td { padding:11px 14px; font-size:.88rem; }
.rank-table td:not(:first-child) { text-align:center; }
.rank-num {
  display:inline-flex; align-items:center; justify-content:center;
  width:26px; height:26px; border-radius:50%;
  font-weight:700; font-size:.8rem; background:var(--surface2); color:var(--muted);
}
.rank-num.r1 { background:rgba(240,180,41,.2); color:var(--accent); }
.rank-num.r2 { background:rgba(148,163,184,.2); color:#CBD5E1; }
.rank-num.r3 { background:rgba(180,130,80,.2); color:#D4916A; }
.pts-badge { font-family:'Barlow Condensed',sans-serif; font-size:1.2rem; font-weight:800; color:var(--accent); }
.chips { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:20px; }
.chip { background:var(--surface2); border:1px solid var(--border); border-radius:20px; padding:5px 14px; font-size:.8rem; font-weight:500; color:var(--muted); }
.chip strong { color:var(--text); font-weight:700; }

/* ── MATCH DETAIL ── */
.match-controls { display:flex; gap:14px; align-items:center; margin-bottom:24px; flex-wrap:wrap; }
.select-wrap { position:relative; flex:1; min-width:200px; max-width:500px; }
.select-wrap select {
  width:100%; appearance:none;
  background:var(--surface2); border:1px solid var(--border);
  color:var(--text); border-radius:8px; padding:11px 40px 11px 14px;
  font-family:'Inter',sans-serif; font-size:.9rem; cursor:pointer; transition:border-color .15s;
}
.select-wrap select:focus { outline:none; border-color:var(--accent); }
.select-wrap::after { content:'▾'; position:absolute; right:14px; top:50%; transform:translateY(-50%); color:var(--muted); pointer-events:none; }
.match-nav { display:flex; gap:6px; }
.nav-btn {
  background:var(--surface2); border:1px solid var(--border); color:var(--text);
  border-radius:7px; width:38px; height:38px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:1rem; transition:background .15s;
}
.nav-btn:hover { background:var(--mid); border-color:var(--accent); }
.nav-btn:disabled { opacity:.3; cursor:default; }
.match-card { background:var(--surface2); border:1px solid var(--border); border-radius:14px; overflow:hidden; margin-bottom:24px; }
.match-card-header { background:var(--mid); padding:12px 20px; display:flex; align-items:center; justify-content:space-between; }
.grp-badge { font-family:'Barlow Condensed',sans-serif; font-size:.85rem; font-weight:700; letter-spacing:.1em; color:var(--accent); background:rgba(240,180,41,.12); border:1px solid rgba(240,180,41,.25); border-radius:4px; padding:2px 10px; }
.match-date { font-size:.82rem; color:var(--muted); }
.match-scoreboard { padding:28px 24px; display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:20px; }
.team-side { display:flex; flex-direction:column; align-items:center; gap:6px; }
.team-name-big { font-family:'Barlow Condensed',sans-serif; font-size:clamp(1.1rem,3vw,1.7rem); font-weight:800; letter-spacing:.04em; text-align:center; }
.score-box { display:flex; align-items:center; gap:10px; }
.score-num { font-family:'Barlow Condensed',sans-serif; font-size:clamp(2.5rem,8vw,4rem); font-weight:900; line-height:1; min-width:56px; text-align:center; }
.score-num.real { color:var(--accent); }
.score-num.pending { color:var(--muted); font-size:2rem; }
.score-sep-big { color:var(--muted); font-size:1.8rem; font-weight:300; }
.result-label { font-size:.75rem; color:var(--muted); text-transform:uppercase; letter-spacing:.1em; text-align:center; padding-top:4px; }
.pred-section-title { font-family:'Barlow Condensed',sans-serif; font-size:1rem; font-weight:700; letter-spacing:.08em; color:var(--muted); text-transform:uppercase; padding:0 20px 10px; margin-top:-4px; }
.pred-table-wrap { overflow-x:auto; }
.pred-table { width:100%; border-collapse:collapse; }
.pred-table th { padding:9px 14px; text-align:left; font-size:.78rem; font-weight:600; letter-spacing:.06em; color:var(--muted); text-transform:uppercase; border-bottom:1px solid var(--border); }
.pred-table th:not(:first-child) { text-align:center; }
.pred-table td { padding:10px 14px; border-bottom:1px solid rgba(255,255,255,.04); }
.pred-table td:not(:first-child) { text-align:center; }
.pred-table tr:last-child td { border-bottom:none; }
.pred-table tr:hover td { background:rgba(255,255,255,.03); }
.pred-name { font-weight:500; font-size:.9rem; }
.pred-score { font-family:'Barlow Condensed',sans-serif; font-size:1.1rem; font-weight:700; }
.pred-score.exact { color:var(--green); }
.pred-score.shared { color:var(--accent); }
.pred-score.miss { color:var(--muted); }
.pred-score.pending { color:var(--muted); font-size:.85rem; }
.pts-pill { display:inline-block; border-radius:12px; padding:2px 10px; font-family:'Barlow Condensed',sans-serif; font-size:.95rem; font-weight:800; }
.pts-pill.p3 { background:rgba(34,197,94,.15); color:var(--green); }
.pts-pill.p1 { background:rgba(240,180,41,.15); color:var(--accent); }
.pts-pill.p0 { background:rgba(100,116,139,.12); color:var(--muted); }
.pts-pill.pnd { background:transparent; color:var(--muted); font-size:.8rem; }

@media (max-width:560px) {
  .podium { flex-direction:column; align-items:center; }
  .podium-slot { width:100%; max-width:280px; flex-direction:row; justify-content:space-between; }
  .match-scoreboard { grid-template-columns:1fr; grid-template-rows:auto auto auto; justify-items:center; }
  .score-box { order:-1; }
}
</style>
</head>
<body>

<!-- ══ LOADING SCREEN ══ -->
<div id="loading-screen">
  <div class="logo-mark">⚽</div>
  <h1>POLLA <span>MUNDIALISTA</span></h1>
  <p class="subtitle">Área Pocheche</p>

  <div class="spinner-wrap" id="spinner-wrap">
    <div class="spinner"></div>
    <p>Cargando resultados...</p>
  </div>

  <div id="manual-section" style="display:none; width:100%; max-width:400px; flex-direction:column; align-items:center;">
    <div class="divider">o sube el Excel manualmente</div>
    <div class="drop-zone" id="drop-zone">
      <input type="file" id="file-input" accept=".xlsx,.xls"/>
      <p>📂 &nbsp;<strong>Arrastra el Excel aquí</strong> o haz clic para buscarlo</p>
    </div>
  </div>
  <div class="error-msg" id="error-msg"></div>
</div>

<!-- ══ MAIN APP ══ -->
<div id="app">
  <header>
    <div class="header-left">
      <span class="header-logo">⚽</span>
      <h1>POLLA <span>MUNDIALISTA</span> <span style="font-size:.9rem;font-weight:400;color:var(--muted);">· Área Pocheche</span></h1>
    </div>
    <div class="header-right">
      <span class="last-updated" id="last-updated"></span>
      <button class="reload-btn" onclick="reloadData()">↻ Actualizar</button>
    </div>
  </header>

  <div class="tab-bar">
    <div class="tab active" onclick="switchTab('ranking')">🏆 Ranking</div>
    <div class="tab" onclick="switchTab('partidos')">🔍 Por partido</div>
  </div>

  <main>
    <div class="panel active" id="panel-ranking">
      <div class="ranking-header">
        <h2>Tabla de posiciones</h2>
        <span class="matches-played" id="matches-info">—</span>
      </div>
      <div class="chips" id="ranking-chips"></div>
      <div class="podium" id="podium"></div>
      <table class="rank-table">
        <thead>
          <tr>
            <th style="width:46px">#</th>
            <th>Participante</th>
            <th>Pts</th>
            <th>Aciertos únicos</th>
            <th>Aciertos compartidos</th>
            <th>Sin acierto</th>
          </tr>
        </thead>
        <tbody id="rank-tbody"></tbody>
      </table>
    </div>

    <div class="panel" id="panel-partidos">
      <div class="match-controls">
        <div class="select-wrap">
          <select id="match-select" onchange="showMatch(parseInt(this.value))"></select>
        </div>
        <div class="match-nav">
          <button class="nav-btn" id="btn-prev" onclick="navigateMatch(-1)">&#8592;</button>
          <button class="nav-btn" id="btn-next" onclick="navigateMatch(+1)">&#8594;</button>
        </div>
      </div>
      <div id="match-detail"></div>
    </div>
  </main>
</div>

<script>
// ══════════════════════════════════════════════════════════
// CONFIG — solo cambia esta línea con tu URL de GitHub Raw
// ══════════════════════════════════════════════════════════
const EXCEL_URL = 'https://raw.githubusercontent.com/andreslindarte/polla-mundialista-pocheche/main/Quiniela_Mundial_2026_v2.xlsx';
// Ejemplo:
// const EXCEL_URL = 'https://raw.githubusercontent.com/TU_USUARIO/polla-pocheche/main/Quiniela_Mundial_2026_v2.xlsx';

// ══════════════════════════════════════════════════════════
// INIT — intenta cargar desde GitHub, si falla muestra upload
// ══════════════════════════════════════════════════════════
let DATA = null;
let currentMatch = 1;

window.addEventListener('DOMContentLoaded', () => {
  if (EXCEL_URL.startsWith('REEMPLAZAR')) {
    showManualUpload('Configura la URL del Excel en el código, o sube el archivo manualmente.');
  } else {
    loadFromURL(EXCEL_URL);
  }
});

async function loadFromURL(url) {
  try {
    // Usa la API de GitHub para bypassear el caché del CDN
    let fetchUrl = url + '?t=' + Date.now();
    let fetchOpts = {};
    const m = url.match(/raw\.githubusercontent\.com\/([^/]+\/[^/]+)\/[^/]+\/(.+)/);
    if (m) {
      fetchUrl = `https://api.github.com/repos/${m[1]}/contents/${m[2]}`;
      fetchOpts = { headers: { 'Accept': 'application/vnd.github.v3.raw' }, cache: 'no-store' };
    }
    const res = await fetch(fetchUrl, fetchOpts);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const buf = await res.arrayBuffer();
    const wb = XLSX.read(buf, { type: 'array' });
    const data = extractData(wb);
    if (!data) throw new Error('Formato no reconocido');
    DATA = data;
    document.getElementById('last-updated').textContent = 'Actualizado ' + new Date().toLocaleTimeString('es-CO', {hour:'2-digit',minute:'2-digit'});
    launchApp();
  } catch(err) {
    showManualUpload('No se pudo cargar automáticamente. Sube el Excel manualmente.');
  }
}

function showManualUpload(msg) {
  document.getElementById('spinner-wrap').style.display = 'none';
  const ms = document.getElementById('manual-section');
  ms.style.display = 'flex';
  if (msg) {
    const em = document.getElementById('error-msg');
    em.textContent = msg; em.style.display = 'block';
  }
}

// manual file upload fallback
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) parseExcelFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', () => { if (fileInput.files[0]) parseExcelFile(fileInput.files[0]); });

function parseExcelFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(e.target.result, { type:'array' });
      const data = extractData(wb);
      if (!data) { showError('Formato no reconocido. Usa el archivo Quiniela_Mundial_2026_v2.xlsx.'); return; }
      DATA = data;
      document.getElementById('last-updated').textContent = 'Cargado manualmente';
      launchApp();
    } catch(err) { showError('Error leyendo el archivo: ' + err.message); }
  };
  reader.readAsArrayBuffer(file);
}

function showError(msg) {
  const em = document.getElementById('error-msg');
  em.textContent = msg; em.style.display = 'block';
}

async function reloadData() {
  if (EXCEL_URL.startsWith('REEMPLAZAR')) return;
  document.getElementById('last-updated').textContent = 'Actualizando...';
  await loadFromURL(EXCEL_URL);
}

// ══════════════════════════════════════════════════════════
// PARSE EXCEL
// ══════════════════════════════════════════════════════════
function extractData(wb) {
  const wsP = wb.Sheets['Participantes'];
  const wsF = wb.Sheets['Fixture'];
  const wsPR = wb.Sheets['Predicciones'];
  if (!wsP || !wsF || !wsPR) return null;

  const pArr = XLSX.utils.sheet_to_json(wsP, { header:1, defval:'' });
  const participants = [];
  for (let r = 4; r < pArr.length; r++) {
    const name = String(pArr[r][1] || '').trim();
    if (!name || name === 'Participante') continue;
    participants.push({ name });
  }
  if (participants.length === 0) return null;

  const fArr = XLSX.utils.sheet_to_json(wsF, { header:1, defval:'' });
  const matches = [], fixture = {};
  for (let r = 4; r < fArr.length; r++) {
    const row = fArr[r];
    const n = parseInt(row[0]);
    if (isNaN(n) || n < 1) continue;
    const home = String(row[2]||'').trim(), away = String(row[5]||'').trim();
    if (!home || !away) continue;
    matches.push({ n, group:String(row[1]).trim(), home, away, date:String(row[6]||'').trim() });
    const gl = row[3], gv = row[4];
    fixture[n] = (gl !== '' && gv !== '' && !isNaN(Number(gl)) && !isNaN(Number(gv)))
      ? { gl:Number(gl), gv:Number(gv) } : null;
  }

  // Ordenar partidos cronológicamente (fecha "11 jun", "12 jun", etc.)
  const monthNum = { ene:1,feb:2,mar:3,abr:4,may:5,jun:6,jul:7,ago:8,sep:9,oct:10,nov:11,dic:12 };
  matches.sort((a, b) => {
    const parse = d => { const [day, mon] = d.trim().toLowerCase().split(' '); return (monthNum[mon]||0)*100 + (parseInt(day)||0); };
    return parse(a.date) - parse(b.date) || a.n - b.n;
  });

  const prArr = XLSX.utils.sheet_to_json(wsPR, { header:1, defval:'' });
  const predictions = participants.map(() => ({}));
  for (let r = 5; r < prArr.length; r++) {
    const row = prArr[r];
    const n = parseInt(row[0]);
    if (isNaN(n) || n < 1) continue;
    for (let p = 0; p < participants.length; p++) {
      const bc = 3 + p * 2;
      const gl = row[bc], gv = row[bc+1];
      predictions[p][n] = (gl !== '' && gv !== '' && !isNaN(Number(gl)) && !isNaN(Number(gv)))
        ? { gl:Number(gl), gv:Number(gv) } : null;
    }
  }
  return { participants, matches, fixture, predictions };
}

// ══════════════════════════════════════════════════════════
// SCORING
// ══════════════════════════════════════════════════════════
function computeScores() {
  const { participants, matches, fixture, predictions } = DATA;
  const numP = participants.length;
  const stats = participants.map(() => ({ pts:0, solo:0, shared:0, miss:0 }));
  matches.forEach(m => {
    const real = fixture[m.n];
    if (!real) return;
    const hitters = [];
    for (let p = 0; p < numP; p++) {
      const pred = predictions[p][m.n];
      if (pred && pred.gl === real.gl && pred.gv === real.gv) hitters.push(p);
    }
    if (hitters.length === 1) { stats[hitters[0]].pts += 3; stats[hitters[0]].solo += 1; }
    else if (hitters.length > 1) hitters.forEach(p => { stats[p].pts += 1; stats[p].shared += 1; });
    for (let p = 0; p < numP; p++) {
      const pred = predictions[p][m.n];
      if (pred && !hitters.includes(p)) stats[p].miss += 1;
    }
  });
  return stats;
}

function getMatchDetail(matchN) {
  const { participants, fixture, predictions } = DATA;
  const numP = participants.length;
  const real = fixture[matchN];
  const hitters = [];
  if (real) {
    for (let p = 0; p < numP; p++) {
      const pred = predictions[p][matchN];
      if (pred && pred.gl === real.gl && pred.gv === real.gv) hitters.push(p);
    }
  }
  const details = [];
  for (let p = 0; p < numP; p++) {
    const pred = predictions[p][matchN];
    let pts = null, status = 'pending';
    if (real && pred) {
      if (hitters.includes(p)) { status = hitters.length === 1 ? 'hit-solo' : 'hit-shared'; pts = hitters.length === 1 ? 3 : 1; }
      else { status = 'miss'; pts = 0; }
    }
    details.push({ name:participants[p].name, pred, status, pts });
  }
  return { real, hitters, details };
}

// ══════════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════════
function launchApp() {
  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  buildMatchSelect();
  renderRanking();
  showMatch(1);
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['ranking','partidos'][i] === tab));
  document.getElementById('panel-ranking').classList.toggle('active', tab === 'ranking');
  document.getElementById('panel-partidos').classList.toggle('active', tab === 'partidos');
}

function renderRanking() {
  const { participants, matches, fixture } = DATA;
  const stats = computeScores();
  const played = matches.filter(m => fixture[m.n] !== null).length;
  document.getElementById('matches-info').textContent = `${played} de ${matches.length} partidos jugados`;
  const totalPreds = DATA.predictions.reduce((sum, pd) => sum + Object.values(pd).filter(v=>v!==null).length, 0);
  document.getElementById('ranking-chips').innerHTML = `
    <span class="chip"><strong>${participants.length}</strong> participantes</span>
    <span class="chip"><strong>${matches.length}</strong> partidos fase de grupos</span>
    <span class="chip"><strong>${played}</strong> jugados</span>
    <span class="chip"><strong>${totalPreds}</strong> predicciones cargadas</span>`;

  const ranked = participants.map((p,i) => ({...p,...stats[i],idx:i}))
    .sort((a,b) => b.pts - a.pts || b.solo - a.solo);

  const medals = ['🥇','🥈','🥉'];
  const podiumOrder = ranked.length >= 3 ? [ranked[1],ranked[0],ranked[2]] : ranked;
  const podiumSlots = ranked.length >= 3 ? ['p2','p1','p3'] : ['p1','p2','p3'];
  document.getElementById('podium').innerHTML = podiumOrder.map((p,i) => {
    const orig = ranked.indexOf(p);
    return `<div class="podium-slot ${podiumSlots[i]}">
      <div class="podium-medal">${medals[orig]||''}</div>
      <div class="podium-name" title="${p.name}">${p.name}</div>
      <div class="podium-pts">${p.pts}</div>
      <div class="podium-pts-lbl">puntos</div>
    </div>`;
  }).join('');

  document.getElementById('rank-tbody').innerHTML = ranked.map((p,i) => `
    <tr>
      <td><span class="rank-num ${i<3?'r'+(i+1):''}">${i+1}</span></td>
      <td class="pred-name">${p.name}</td>
      <td><span class="pts-badge">${p.pts}</span></td>
      <td>${p.solo}</td><td>${p.shared}</td><td>${p.miss}</td>
    </tr>`).join('');
}

function buildMatchSelect() {
  const { matches, fixture } = DATA;
  document.getElementById('match-select').innerHTML = matches.map(m =>
    `<option value="${m.n}">#${m.n} · ${m.home} vs ${m.away} · Grupo ${m.group}${fixture[m.n]?' ✓':''}</option>`
  ).join('');
}

function showMatch(n) {
  const { matches, fixture } = DATA;
  currentMatch = n;
  document.getElementById('match-select').value = n;
  document.getElementById('btn-prev').disabled = n <= matches[0].n;
  document.getElementById('btn-next').disabled = n >= matches[matches.length-1].n;
  const match = matches.find(m => m.n === n);
  if (!match) return;
  const { real, details } = getMatchDetail(n);
  const pending = !real;
  const hitters = details.filter(d => d.status==='hit-solo'||d.status==='hit-shared');
  let winnerNote = '';
  if (!pending) {
    if (hitters.length === 0) winnerNote = `<div style="color:var(--muted);font-size:.82rem;text-align:center;padding-bottom:4px">Nadie acertó este partido</div>`;
    else if (hitters.length === 1) winnerNote = `<div style="color:var(--green);font-size:.82rem;text-align:center;padding-bottom:4px">🎯 Acierto único — <strong>${hitters[0].name}</strong> gana 3 pts</div>`;
    else winnerNote = `<div style="color:var(--accent);font-size:.82rem;text-align:center;padding-bottom:4px">🎯 ${hitters.length} participantes acertaron — 1 pt cada uno</div>`;
  }
  document.getElementById('match-detail').innerHTML = `
    <div class="match-card">
      <div class="match-card-header">
        <span class="grp-badge">GRUPO ${match.group}</span>
        <span class="match-date">Partido #${match.n} · ${match.date}</span>
      </div>
      <div class="match-scoreboard">
        <div class="team-side"><div class="team-name-big">${match.home}</div><div class="result-label">local</div></div>
        <div class="score-box">
          <div class="score-num ${pending?'pending':'real'}">${pending?'?':real.gl}</div>
          <div class="score-sep-big">–</div>
          <div class="score-num ${pending?'pending':'real'}">${pending?'?':real.gv}</div>
        </div>
        <div class="team-side"><div class="team-name-big">${match.away}</div><div class="result-label">visitante</div></div>
      </div>
      ${winnerNote}
      <div class="pred-section-title">Predicciones</div>
      <div class="pred-table-wrap">
        <table class="pred-table">
          <thead><tr><th>Participante</th><th>Predicción</th><th>Pts este partido</th></tr></thead>
          <tbody>${details.map(d => {
            const predStr = d.pred ? `${d.pred.gl}–${d.pred.gv}` : '—';
            const predCls = !d.pred ? 'pending' : d.status==='hit-solo'?'exact':d.status==='hit-shared'?'shared':d.status==='miss'?'miss':'pending';
            const ptsBadge = (pending||!d.pred) ? `<span class="pts-pill pnd">—</span>`
              : `<span class="pts-pill ${d.pts===3?'p3':d.pts===1?'p1':'p0'}">${d.pts} pt${d.pts!==1?'s':''}</span>`;
            return `<tr><td class="pred-name">${d.name}</td><td><span class="pred-score ${predCls}">${predStr}</span></td><td>${ptsBadge}</td></tr>`;
          }).join('')}</tbody>
        </table>
      </div>
    </div>`;
}

function navigateMatch(dir) {
  const { matches } = DATA;
  const next = matches[matches.findIndex(m => m.n === currentMatch) + dir];
  if (next) showMatch(next.n);
}
</script>
